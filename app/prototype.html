<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tentiq — UX Testing Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f5f3ef;
  --bg2:     #ffffff;
  --bg3:     #f0ede8;
  --bg4:     #e8e4dd;
  --border:  rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --indigo:  #4a3fdb;
  --indigo-light: rgba(74,63,219,0.08);
  --indigo-mid:   rgba(74,63,219,0.18);
  --amber:   #d4820a;
  --amber-light: rgba(212,130,10,0.1);
  --green:   #1a7a4a;
  --green-light: rgba(26,122,74,0.09);
  --text:    #1a1816;
  --text2:   #6b6560;
  --text3:   #a89f96;
  --mono:    'Space Mono', monospace;
  --sans:    'Plus Jakarta Sans', sans-serif;
  --r:       12px;
  --r-sm:    8px;
  --shadow:  0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06);
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:2px; }

/* ── Inputs ── */
.input {
  width:100%; height:46px;
  background:var(--bg2); border:1.5px solid var(--border2);
  border-radius:var(--r-sm); color:var(--text);
  font-family:var(--sans); font-size:15px; padding:0 14px; outline:none;
  transition:border-color 0.18s, box-shadow 0.18s;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
}
.input:focus { border-color:var(--indigo); box-shadow:0 0 0 3px var(--indigo-light), inset 0 1px 2px rgba(0,0,0,0.04); }
.input::placeholder { color:var(--text3); }

/* ── Buttons ── */
.btn-primary {
  width:100%; height:46px; background:var(--indigo); border:none;
  border-radius:var(--r-sm); color:#fff;
  font-family:var(--sans); font-size:15px; font-weight:700;
  cursor:pointer; transition:opacity 0.15s, transform 0.1s, box-shadow 0.15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 2px 8px rgba(74,63,219,0.3);
}
.btn-primary:hover { opacity:0.92; box-shadow:0 4px 16px rgba(74,63,219,0.35); }
.btn-primary:active { transform:scale(0.98); }
.btn-primary:disabled { opacity:0.4; cursor:default; box-shadow:none; }

.btn-ghost {
  background:var(--bg2); border:1.5px solid var(--border2);
  border-radius:var(--r-sm); color:var(--text2);
  font-family:var(--sans); font-size:14px; font-weight:500;
  cursor:pointer; padding:0 16px; height:38px;
  display:flex; align-items:center; gap:6px;
  transition:all 0.15s; box-shadow:var(--shadow);
}
.btn-ghost:hover { border-color:var(--border2); color:var(--text); background:var(--bg3); }

/* ── Card ── */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--shadow); }

/* ── Field label ── */
.lbl { font-size:12px; font-weight:700; color:var(--text2); margin-bottom:7px; letter-spacing:0.04em; text-transform:uppercase; }

/* ── Pill ── */
.pill {
  display:inline-flex; align-items:center;
  padding:3px 10px; border-radius:20px;
  font-size:12px; font-weight:600;
  background:var(--bg3); color:var(--text2);
}
.pill.indigo { background:var(--indigo-light); color:var(--indigo); }
.pill.green  { background:var(--green-light); color:var(--green); }
.pill.amber  { background:var(--amber-light); color:var(--amber); }

/* ── Segmented ── */
.seg { display:flex; gap:3px; background:var(--bg3); border-radius:var(--r-sm); padding:3px; border:1px solid var(--border); }
.seg-btn {
  flex:1; height:34px; border-radius:6px; border:none;
  font-family:var(--sans); font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.15s; color:var(--text2); background:transparent;
}
.seg-btn.on { background:var(--bg2); color:var(--text); box-shadow:var(--shadow); }
.seg-btn:hover:not(.on) { color:var(--text); background:rgba(0,0,0,0.03); }

/* ── Progress ── */
.prog-track { height:3px; background:var(--bg4); border-radius:2px; overflow:hidden; }
.prog-fill  { height:100%; background:var(--indigo); border-radius:2px; transition:width 0.4s ease; }

/* ── Range ── */
input[type=range] { -webkit-appearance:none; width:100%; height:4px; background:var(--bg4); border-radius:2px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:var(--indigo); border-radius:50%; cursor:pointer; box-shadow:0 0 0 4px var(--indigo-light); }

/* ── Logo ── */
.logo { font-family:var(--sans); font-weight:800; font-size:17px; letter-spacing:-0.04em; color:var(--text); }
.logo span { color:var(--indigo); }

/* ── Divider ── */
.divider { height:1px; background:var(--border); margin:18px 0; }

/* ── Reward toast ── */
@keyframes toastIn  { from { opacity:0; transform:translateX(100px) scale(0.92); } to { opacity:1; transform:none; } }
@keyframes toastOut { from { opacity:1; transform:none; }  to { opacity:0; transform:translateX(100px); } }
.toast        { animation:toastIn  0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.toast.hiding { animation:toastOut 0.28s ease forwards; }

/* ── AI pulse ── */
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }
.pulse { animation:pulse 1.8s ease-in-out infinite; }

/* ── Swipe ── */
@keyframes swipeRight { to { transform:translateX(130%) rotate(10deg); opacity:0; } }
@keyframes swipeLeft  { to { transform:translateX(-130%) rotate(-10deg); opacity:0; } }
.sr { animation:swipeRight 0.38s cubic-bezier(0.55,0,1,0.45) forwards; }
.sl { animation:swipeLeft  0.38s cubic-bezier(0.55,0,1,0.45) forwards; }

/* ── Summary number pop ── */
@keyframes numPop { from { transform:scale(0.6); opacity:0; } to { transform:scale(1); opacity:1; } }
.num-pop { animation:numPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }

/* ── Screen wrapper ── */
.screen { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }

/* ── Nav dots ── */
.nav-dot {
  height:7px; border-radius:4px; border:none; cursor:pointer;
  transition:all 0.2s; background:var(--bg4); padding:0;
}
.nav-dot.active { background:var(--indigo); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* SCREEN 1 — LOGIN */
function LoginScreen({ onNext }) {
  const [loading, setLoading] = useState(false);
  function submit(e) { e.preventDefault(); setLoading(true); setTimeout(()=>{ setLoading(false); onNext(); }, 700); }
  return (
    <div style={{width:'100vw', height:'100vh', display:'flex'}}>
      {/* Left brand panel */}
      <div style={{
        width:'44%', borderRight:'1px solid var(--border)',
        display:'flex', flexDirection:'column', justifyContent:'center', padding:'64px 56px',
        background:'var(--bg2)'
      }}>
        <div className="logo" style={{fontSize:22, marginBottom:48}}><span>ten</span>tiq</div>
        <div style={{fontSize:38, fontWeight:800, letterSpacing:'-0.04em', lineHeight:1.1, marginBottom:18}}>
          Real feedback.<br/>Real earnings.
        </div>
        <div style={{fontSize:16, color:'var(--text2)', lineHeight:1.75, marginBottom:40}}>
          Complete short UX tasks on live websites. Our AI verifies your work and pays you instantly after every session.
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:12}}>
          {[
            ['Average $6–12 / hr', 'indigo'],
            ['Instant payouts via Lightning', 'green'],
            ['New tasks every day', null],
            ['Work from anywhere', null],
          ].map(([f, color]) => (
            <div key={f} style={{display:'flex', gap:12, alignItems:'center'}}>
              <div style={{width:7, height:7, borderRadius:'50%', flexShrink:0, background: color==='indigo' ? 'var(--indigo)' : color==='green' ? 'var(--green)' : 'var(--bg4)'}}/>
              <span style={{fontSize:14, color: color ? 'var(--text)' : 'var(--text2)'}}>{f}</span>
            </div>
          ))}
        </div>

        {/* Testimonial */}
        <div style={{marginTop:48, padding:'16px 20px', background:'var(--bg)', borderRadius:12, border:'1px solid var(--border)'}}>
          <div style={{fontSize:13, color:'var(--text2)', lineHeight:1.6, marginBottom:10, fontStyle:'italic'}}>
            "Made $47 last weekend testing fintech apps. Payouts are instant — love it."
          </div>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <div style={{width:28, height:28, borderRadius:'50%', background:'var(--indigo-light)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14}}>M</div>
            <div>
              <div style={{fontSize:12, fontWeight:700}}>Maria K.</div>
              <div style={{fontSize:11, color:'var(--text3)'}}>963 tasks completed</div>
            </div>
          </div>
        </div>
      </div>

      {/* Right form */}
      <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'64px'}}>
        <div style={{width:400}}>
          <div style={{marginBottom:36}}>
            <div style={{fontSize:28, fontWeight:800, letterSpacing:'-0.03em', marginBottom:6}}>Welcome back</div>
            <div style={{fontSize:15, color:'var(--text2)'}}>Don't have an account? <span style={{color:'var(--indigo)', fontWeight:600, cursor:'pointer'}} onClick={onNext}>Sign up free →</span></div>
          </div>
          <form onSubmit={submit} style={{display:'flex', flexDirection:'column', gap:14}}>
            <div>
              <div className="lbl">Email</div>
              <input className="input" type="email" placeholder="you@example.com" defaultValue="alex@gmail.com" />
            </div>
            <div>
              <div className="lbl">Password</div>
              <input className="input" type="password" defaultValue="password123" />
            </div>
            <div style={{display:'flex', justifyContent:'flex-end'}}>
              <span style={{fontSize:13, color:'var(--text2)', cursor:'pointer'}}>Forgot password?</span>
            </div>
            <button className="btn-primary" type="submit">
              {loading ? <span style={{fontFamily:'var(--mono)', fontSize:13, opacity:0.8}}>signing in…</span> : 'Continue →'}
            </button>
          </form>

          <div style={{position:'relative', margin:'20px 0'}}>
            <div className="divider"/>
            <span style={{position:'absolute', left:'50%', top:-9, transform:'translateX(-50%)', background:'var(--bg)', padding:'0 10px', fontSize:12, color:'var(--text3)'}}>or continue with</span>
          </div>

          <div style={{display:'flex', gap:10}}>
            {[['G','Google'],['𝕏','Twitter']].map(([ic,nm]) => (
              <button key={nm} className="btn-ghost" style={{flex:1, justifyContent:'center', height:44}} onClick={onNext}>
                <span style={{fontSize:16}}>{ic}</span>{nm}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* SCREEN 2 — DEMOGRAPHICS */
function DemoScreen({ onNext }) {
  const [age, setAge]       = useState('25–34');
  const [income, setIncome] = useState('$1k–3k');
  const [device, setDevice] = useState('Desktop');
  const [tech, setTech]     = useState(65);
  const [tags, setTags]     = useState(new Set(['E-commerce','SaaS']));
  const allTags = ['E-commerce','Finance','SaaS','Social','Travel','Health','Gaming','Education'];

  function toggleTag(t) {
    setTags(prev => { const s = new Set(prev); s.has(t) ? s.delete(t) : s.add(t); return s; });
  }

  return (
    <div style={{width:560}}>
      <div style={{marginBottom:28}}>
        <div className="logo" style={{marginBottom:20}}><span>ten</span>tiq</div>
        <div style={{fontSize:28, fontWeight:800, letterSpacing:'-0.03em', marginBottom:6}}>Your tester profile</div>
        <div style={{fontSize:15, color:'var(--text2)'}}>Helps us match you with the most relevant tests</div>
      </div>

      <div style={{marginBottom:28}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
          <span style={{fontSize:12, color:'var(--text3)', fontFamily:'var(--mono)', fontWeight:700}}>STEP 2 OF 3</span>
        </div>
        <div className="prog-track"><div className="prog-fill" style={{width:'66%'}}/></div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:18}}>
        <div>
          <div className="lbl">Age range</div>
          <div className="seg">
            {['18–24','25–34','35–44','45+'].map(a => (
              <button key={a} className={`seg-btn${age===a?' on':''}`} onClick={()=>setAge(a)}>{a}</button>
            ))}
          </div>
        </div>

        <div>
          <div className="lbl">Country</div>
          <select className="input" style={{cursor:'pointer', color:'var(--text)', fontSize:14}}>
            {['🇷🇺  Russia','🇺🇸  United States','🇩🇪  Germany','🇧🇷  Brazil','🇮🇳  India','🇬🇧  UK'].map(c => <option key={c}>{c}</option>)}
          </select>
        </div>

        <div>
          <div className="lbl">Monthly income</div>
          <div className="seg">
            {['<$500','$500–1k','$1k–3k','$3k+'].map(i => (
              <button key={i} className={`seg-btn${income===i?' on':''}`} style={{fontSize:12}} onClick={()=>setIncome(i)}>{i}</button>
            ))}
          </div>
        </div>

        <div>
          <div className="lbl">Primary device</div>
          <div className="seg">
            {['Desktop','Mobile','Both'].map(d => (
              <button key={d} className={`seg-btn${device===d?' on':''}`} onClick={()=>setDevice(d)}>{d}</button>
            ))}
          </div>
        </div>

        <div style={{gridColumn:'1/-1'}}>
          <div className="lbl" style={{display:'flex', justifyContent:'space-between'}}>
            <span>Tech comfort</span>
            <span style={{color:'var(--indigo)', fontFamily:'var(--mono)', textTransform:'none', letterSpacing:0, fontSize:12, fontWeight:700}}>
              {tech < 30 ? 'Beginner' : tech < 55 ? 'Average' : tech < 80 ? 'Proficient' : 'Expert'}
            </span>
          </div>
          <input type="range" min={0} max={100} value={tech} onChange={e=>setTech(+e.target.value)} />
        </div>

        <div style={{gridColumn:'1/-1'}}>
          <div className="lbl">Interests</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:7}}>
            {allTags.map(t => {
              const on = tags.has(t);
              return (
                <button key={t} onClick={()=>toggleTag(t)} style={{
                  padding:'6px 14px', borderRadius:20, border:'1.5px solid',
                  borderColor: on ? 'var(--indigo)' : 'var(--border2)',
                  background: on ? 'var(--indigo-light)' : 'var(--bg2)',
                  color: on ? 'var(--indigo)' : 'var(--text2)',
                  fontSize:13, fontWeight:600, fontFamily:'var(--sans)', cursor:'pointer',
                  transition:'all 0.14s'
                }}>{t}</button>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{marginTop:28}}>
        <button className="btn-primary" onClick={onNext}>Start testing →</button>
      </div>
    </div>
  );
}

/* FAKE SITE COMPONENTS */

function SiteEcommerce({ onComplete }) {
  return (
    <div style={{display:'flex', height:'100%'}}>

        ))}
        <div style={{marginTop:18, fontSize:10, fontWeight:700, color:'#bbb', marginBottom:10, letterSpacing:'0.1em'}}>COLOR</div>

          {['#3b82f6','#ef4444','#111','#10b981','#f59e0b','#8b5cf6'].map((c,i)=>(
            <div key={c} style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:i===0?'2px solid #333':'2px solid transparent'}}/>

        </div>
        <div style={{marginTop:18, fontSize:10, fontWeight:700, color:'#bbb', marginBottom:10, letterSpacing:'0.1em'}}>SIZE</div>

            </div>

function SiteFintech({ onComplete }) {
  return (
    <div style={{height:'100%', background:'#f8fafc', overflow:'auto'}}>
      <div style={{background:'#0f172a', padding:'20px 32px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div style={{color:'#fff', fontWeight:800, fontSize:18}}>neobank<span style={{color:'#818cf8'}}>.</span>io</div>
        <div style={{display:'flex', gap:20}}>
          {['Personal','Business','Loans','Rates'].map((t,i)=>(

      <div style={{padding:'28px 32px'}}>

        <div style={{fontSize:14, color:'#64748b', marginBottom:20}}>Find the best rate for your situation — updated daily</div>
        <div style={{display:'flex', gap:12, marginBottom:20}}>
          {[['Loan type','Personal ▾'],['Amount','$10,000 ▾'],['Term','36 months ▾'],['Credit','Good (700+) ▾']].map(([l,v])=>(
            <div key={l} style={{flex:1}}>
              <div style={{fontSize:10, fontWeight:700, color:'#94a3b8', marginBottom:4, letterSpacing:'0.06em'}}>{l}</div>
              <div style={{height:36, background:'#fff', border:'1px solid #e2e8f0', borderRadius:7, display:'flex', alignItems:'center', padding:'0 12px', fontSize:13, color:'#334155', cursor:'pointer'}}>{v}</div>
            </div>
          ))}
        </div>

function TestScreen({ onSwipe, onEnd, taskIdx = 0 }) {

  const SiteComponent = task.component;

  const [aiState, setAiState]          = useState('watching');
  const [earned, setEarned]            = useState(1.50);
  const [showToast, setShowToast]      = useState(false);
  const [hidingToast, setHidingToast]  = useState(false);


  useEffect(() => {
    setAiState('watching'); setShowToast(false); setHidingToast(false);
  }, [taskIdx]);

  function handleComplete() {
    if (aiState !== 'watching') return;
    setAiState('found');
    setTimeout(() => {
      setAiState('done');
      setEarned(e => +(e + 0.50).toFixed(2));
      setShowToast(true);

/* == SCREEN 4 — SWIPE == */
const _rewards = [0.50, 0.75, 0.50, 1.00, 0.65, 0.55];
const _times   = ['~3 min','~4 min','~3 min','~5 min','~4 min','~4 min'];
const SITES = TASK_DEFS.map((t, i) => ({
  name: t.site, task: t.title, reward: _rewards[i], time: _times[i], tag: t.tag, icon: t.icon, idx: i
}));

function SwipeScreen({ onStart, onEnd }) {
  const [idx, setIdx]   = useState(0);
  const [dir, setDir]   = useState(null);
  const [busy, setBusy] = useState(false);

  function swipe(d) {
    if (busy) return;
    setDir(d); setBusy(true);
    setTimeout(()=>{
      const nextIdx = (idx+1) % SITES.length;
      setIdx(nextIdx);
      setDir(null); setBusy(false);
      if (d==='right') onStart(idx);
    }, 370);
  }

  const s = SITES[idx];
  const next = SITES[(idx+1)%SITES.length];

  return (
    <div style={{width:'100vw', height:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
      <div style={{position:'absolute', top:0, left:0, right:0, height:52, display:'flex', alignItems:'center', padding:'0 24px', justifyContent:'space-between', borderBottom:'1px solid var(--border)', background:'var(--bg2)'}}>
        <div className="logo"><span>ten</span>tiq</div>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span className="pill indigo">$2.00 earned</span>
          <button className="btn-ghost" style={{fontSize:13}} onClick={onEnd}>End session</button>
        </div>
      </div>

      <div style={{textAlign:'center', marginBottom:28}}>
        <div style={{fontSize:26, fontWeight:800, letterSpacing:'-0.03em', marginBottom:5}}>Next up</div>
        <div style={{fontSize:14, color:'var(--text2)'}}>Swipe right to start · left to skip</div>
      </div>

      {/* Card deck */}
      <div style={{width:420, height:270, position:'relative', marginBottom:28}}>
        {/* Back card */}
        <div className="card" style={{position:'absolute', left:14, right:-14, top:12, height:250, opacity:0.35, transform:'scale(0.96)', transformOrigin:'top center'}}>
          <div style={{padding:24, fontWeight:700, color:'var(--text3)', fontSize:15}}>{next.icon} {next.name}</div>
        </div>

        {/* Main card */}
        <div className={`card${dir==='right'?' sr':dir==='left'?' sl':''}`} style={{
          position:'absolute', inset:0, padding:26,
          display:'flex', flexDirection:'column', justifyContent:'space-between',
          boxShadow:'var(--shadow-lg)', cursor:'grab'
        }}>
          <div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
              <div>
                <div style={{fontSize:19, fontWeight:800, marginBottom:4}}>{s.name}</div>
                <div style={{fontSize:14, color:'var(--text2)', lineHeight:1.5}}>{s.task}</div>
              </div>
              <div style={{background:'var(--amber-light)', border:'1px solid rgba(212,130,10,0.2)', padding:'6px 12px', borderRadius:8, textAlign:'right', flexShrink:0, marginLeft:16}}>
                <div style={{fontFamily:'var(--mono)', fontWeight:700, color:'var(--amber)', fontSize:18}}>${s.reward.toFixed(2)}</div>
                <div style={{fontSize:10, color:'var(--text3)'}}>reward</div>
              </div>
            </div>
            <div style={{display:'flex', gap:7}}>
              <span className="pill">{s.time}</span>
              <span className="pill">{s.tag}</span>
            </div>
          </div>
          <div style={{height:72, borderRadius:8, background:'var(--bg3)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center'}}>
            <span style={{color:'var(--text3)', fontSize:13}}>site preview</span>
          </div>
        </div>
      </div>

      {/* Action buttons */}
      <div style={{display:'flex', gap:14, alignItems:'center'}}>
        <button onClick={()=>swipe('left')} style={{width:52, height:52, borderRadius:'50%', background:'var(--bg2)', border:'1.5px solid var(--border2)', fontSize:18, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'var(--shadow)'}}>👈</button>
        <button onClick={()=>swipe('right')} style={{width:60, height:60, borderRadius:'50%', background:'var(--indigo)', border:'none', color:'#fff', fontSize:22, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 16px rgba(74,63,219,0.35)'}}>→</button>
        <button onClick={()=>swipe('left')} style={{width:52, height:52, borderRadius:'50%', background:'var(--bg2)', border:'1.5px solid var(--border2)', fontSize:18, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'var(--shadow)'}}>🚩</button>
      </div>
      <div style={{marginTop:10, fontSize:12, color:'var(--text3)'}}>skip &nbsp;·&nbsp; start &nbsp;·&nbsp; report</div>

      {/* Session mini-stats */}
      <div style={{display:'flex', gap:10, marginTop:28}}>
        {[['5','tasks'],['$2.00','earned'],['23 min','time']].map(([v,l])=>(
          <div key={l} className="card" style={{padding:'10px 16px', textAlign:'center', minWidth:90}}>
            <div style={{fontFamily:'var(--mono)', fontWeight:700, fontSize:17}}>{v}</div>
            <div style={{fontSize:11, color:'var(--text3)', marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

        {[['shop.example.com','Add blue hoodie to cart','$1.00'],
          ['fintech-startup.io','Compare loan rates','$1.75'],
          ['saas-dashboard.app','Create workspace & invite','$1.50']].map(([site,task,earn])=>(
          <div key={site} style={{display:'flex', alignItems:'center', gap:12, paddingBottom:10, marginBottom:10, borderBottom:'1px solid var(--border)'}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:'var(--indigo)',flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:14, fontWeight:600}}>{site}</div>
              <div style={{fontSize:12, color:'var(--text2)'}}>{task}</div>
            </div>
            <div style={{fontFamily:'var(--mono)', fontWeight:700, color:'var(--green)', fontSize:14}}>{earn}</div>
          </div>
        ))}
      </div>

      <button className="btn-primary" onClick={onNext}>
        {isNew ? '⚡ Connect wallet & collect $4.25' : '⚡ Send $4.25 to my wallet →'}
      </button>
      <div style={{textAlign:'center', marginTop:12}}>
        <span style={{fontSize:13, color:'var(--text3)', cursor:'pointer'}}>Share results for a +10% bonus →</span>
      </div>
    </div>
  );
}

/* ROOT APP */
const SCREENS = ['login','demo','test','summary','wallet'];

function App() {
  const [cur, setCur]     = useState('login');
  const [isNew]           = useState(false);
  const [taskIdx, setTaskIdx] = useState(0);

  function go(s) { setCur(s); }
  function nextTask() { setTaskIdx(i => (i + 1) % TASK_DEFS.length); setCur('test'); }

  return (
    <div style={{width:'100vw', height:'100vh', overflow:'hidden', position:'relative', background:'var(--bg)'}}>
      {cur === 'login'   && <div className="screen"><LoginScreen onNext={()=>go('demo')} /></div>}
      {cur === 'demo'    && <div className="screen"><DemoScreen  onNext={()=>go('test')} /></div>}
      {cur === 'test'    && <div className="screen" style={{alignItems:'flex-start'}}><TestScreen onSwipe={nextTask} onEnd={()=>go('summary')} taskIdx={taskIdx} /></div>}
      {cur === 'summary' && <div className="screen" style={{alignItems:'flex-start', overflowY:'auto'}}><div style={{width:'100%',display:'flex',justifyContent:'center'}}><SummaryScreen onNext={()=>go('wallet')} isNew={isNew} /></div></div>}
      {cur === 'wallet'  && <div className="screen">{isNew ? <WalletNewScreen onDone={()=>go('login')} /> : <WalletDoneScreen onRestart={()=>go('login')} />}</div>}

      {/* Nav dots */}
      <div style={{position:'fixed', bottom:16, left:'50%', transform:'translateX(-50%)', display:'flex', gap:7, alignItems:'center', background:'rgba(255,255,255,0.85)', backdropFilter:'blur(8px)', padding:'7px 14px', borderRadius:20, border:'1px solid var(--border)', boxShadow:'var(--shadow)'}}>
        {SCREENS.map(s=>(
          <button key={s} onClick={()=>go(s)} title={s} className={`nav-dot${cur===s?' active':''}`} style={{width:cur===s?20:7}}/>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
